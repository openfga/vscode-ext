version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint"
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint"
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint"
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/upload-artifact"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      dependencies:
        patterns:
          - "*"
