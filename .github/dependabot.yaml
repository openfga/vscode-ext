version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint"
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint"
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint"
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/actions/upload-artifact"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
