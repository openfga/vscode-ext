on:
  workflow_dispatch:
  push:
    tags:
      - "*"

name: Publish Extension
jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/main.yaml
  verify-tokens:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Versions below should be kept in sync with package.json devDependencies
    steps:
      - name: Verify VS Marketplace token
        run: npx @vscode/vsce@3.7.1 verify-pat openfga
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
      - name: Verify Open VSX token
        run: npx ovsx@0.10.9 verify-pat openfga -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
  publish-openvsx:
    needs: [test, verify-tokens]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # 7.0.0
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"
          scope: "@openfga"
          always-auth: false
          cache: "npm"
          cache-dependency-path: ./package-lock.json
      - run: npm ci
      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # 2.0.0
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          preRelease: ${{ contains(github.ref, '-') }}
  publish-vscode-marketplace:
    needs: [test, verify-tokens]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # 7.0.0
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"
          scope: "@openfga"
          always-auth: false
          cache: "npm"
          cache-dependency-path: ./package-lock.json
      - run: npm ci
      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # 2.0.0
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com/
          preRelease: ${{ contains(github.ref, '-') }}
  # Build the VSIX and attach it to the draft release created by release-please.
  attach-asset:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-openvsx, publish-vscode-marketplace]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: upload-artifact
        name: Upload Artifact
        uses: ./.github/actions/upload-artifact
      - name: Attach VSIX to draft release
        run: gh release upload "${GITHUB_REF_NAME}" "${ASSET}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ASSET: ${{ steps.upload-artifact.outputs.location }}
  # Undraft the release once the VSIX is attached (this makes it immutable).
  undraft-release:
    needs: attach-asset
    permissions:
      contents: write
    uses: openfga/.github/.github/workflows/undraft-release.yml@835baf31562809ad9eb884c73efc5b79318f700f # pin@main
